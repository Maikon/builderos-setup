# BuilderOS personalisation manifest.
#
# Runs on every VM launch (task + session), after repo checkout and before the
# agent starts. Operations run in the order listed.
#
# Set the reference with:
#   fv personalisation set --url <git-url-of-this-repo> --required
#
# NOTE: `target` paths are absolute. `~` is NOT expanded — use /home/dev/...
apply:
  # 1. Merge our Claude settings (enabled plugins, marketplaces, editor prefs)
  #    into the VM's settings.json. Deep-merge, so anything the image already
  #    sets is preserved unless we override the same key.
  - merge_config:
      target: /home/dev/.claude/settings.json
      from: claude/settings.json
      format: json

  # 2. Install the Claude Code hook scripts (silent bash wrapper + auto
  #    mix-format on edit) that the merged settings.json references at
  #    ~/.claude/hooks/. The files must be on disk for the hooks to fire.
  - run_script:
      script: setup/install-hooks.sh
      run_as: dev

  # 3. Install personal skills bundled in skills/ into ~/.claude/skills.
  - run_script:
      script: setup/install-skills.sh
      run_as: dev

  # 4. Register MCP servers (Sentry, Notion, Tidewave) at user scope.
  #    atlassian is deliberately NOT registered here — the platform injects it
  #    from the dashboard Jira connection. See the script header.
  - run_script:
      script: setup/install-mcps.sh
      run_as: dev
